<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Festa do Igor Melancia 🎉🍉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #FF5F6D, #FFC371);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px #000;
    }

    .melancia-img {
      width: 200px;
      margin-bottom: 20px;
      animation: girar 5s linear infinite;
    }

    @keyframes girar {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .botao-play {
      padding: 15px 30px;
      font-size: 1.5em;
      background-color: #28a745;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 2px 2px 10px #000;
      transition: transform 0.2s;
    }

    .botao-play:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <h1>🎉 Parabéns Igor Melancia! 🍉</h1>
  <img class="melancia-img" src="https://i.imgur.com/3RrFrYH.png" alt="Melancia animada">

  <button class="botao-play" id="playButton">🎵 Tocar Música!</button>

  <audio id="audioFesta">
    <source src="audio.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <script>
    const audio = document.getElementById('audioFesta');
    const btn = document.getElementById('playButton');

    btn.addEventListener('click', () => {
      audio.play();
      btn.textContent = "🎶 Música Tocando!";
      btn.disabled = true;
    });
  </script>
</body>
</html>
